# Dashboard Registry - Production
# Pfad: /opt/disc/registry/docker-compose.yml

services:
  registry:
    image: registry:2
    container_name: docker-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - /opt/disc/registry/data:/var/lib/registry
    networks:
      - dashboard_network

  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: registry-ui
    restart: unless-stopped
    # Kein externer Port - nur über Nginx erreichbar
    expose:
      - "80"
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Dashboard Registry
      - REGISTRY_URL=http://disc.industrieschule.de/v2
      - DELETE_IMAGES=true
      - SHOW_CONTENT_DIGEST=true
      - SHOW_CATALOG_NB_TAGS=true
      - REGISTRY_SECURED=false
    depends_on:
      - registry
    networks:
      - dashboard_network

networks:
  dashboard_network:
    external: true
    name: dashboard_network
