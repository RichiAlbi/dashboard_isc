# Dashboard Reverse Proxy mit LDAP Auth
# Pfad: /opt/disc/proxy/docker-compose.yml

services:
  proxy:
    image: nginx:stable
    container_name: dashboard_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      # Optional: SSL Zertifikate
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - ldap-auth
    networks:
      - dashboard_network

  ldap-auth:
    image: caltechads/nginx-ldap-auth-service:latest
    container_name: dashboard_ldap_auth
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Web Server Settings
      - HOSTNAME=0.0.0.0
      - PORT=8888
      - INSECURE=True  # Intern im Docker Netzwerk, HTTPS wird vom nginx terminiert
      
      # Session Settings (aus .env)
      - SECRET_KEY=${SECRET_KEY}
      - CSRF_SECRET_KEY=${CSRF_SECRET_KEY}
      - COOKIE_NAME=dashboard_auth
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-3600}
      - AUTH_REALM=Dashboard ISC
      
      # LDAP Settings (aus .env)
      - LDAP_URI=${LDAP_URI}
      - LDAP_BINDDN=${LDAP_BINDDN}
      - LDAP_PASSWORD=${LDAP_PASSWORD}
      - LDAP_BASEDN=${LDAP_BASEDN}
      - LDAP_USER_BASEDN=${LDAP_USER_BASEDN:-}
      - LDAP_USERNAME_ATTRIBUTE=${LDAP_USERNAME_ATTRIBUTE:-sAMAccountName}
      - LDAP_FULL_NAME_ATTRIBUTE=${LDAP_FULL_NAME_ATTRIBUTE:-cn}
      - LDAP_STARTTLS=${LDAP_STARTTLS:-False}
    networks:
      - dashboard_network
    # Kein Port-Expose nötig - nur intern erreichbar

networks:
  dashboard_network:
    external: true
    name: dashboard_network
