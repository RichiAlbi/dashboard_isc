# Dashboard Reverse Proxy
# Pfad: /opt/disc/proxy/docker-compose.yml
#
# Einfacher nginx Reverse Proxy für Frontend und Backend
# Authentifizierung erfolgt direkt im Backend via LDAP

services:
  proxy:
    image: nginx:stable
    container_name: dashboard_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      # Optional: SSL Zertifikate
      # - ./certs:/etc/nginx/certs:ro
    networks:
      - dashboard_network

networks:
  dashboard_network:
    external: true
    name: dashboard_network
