# Upstream Definitionen
upstream frontend {
    server dashboard_frontend:80;
}

upstream backend {
    server dashboard_backend:8000;
}

upstream ldap_auth {
    server dashboard_ldap_auth:8888;
}

server {
    listen 80;
    server_name _;

    # Ausführliches Access Log für Debugging
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log debug;

    # ============================================================
    # LDAP Auth Endpoints (vom nginx-ldap-auth-service)
    # ============================================================
    
    # Login/Logout Handling über den Auth Service
    location /auth {
        proxy_pass http://ldap_auth/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CSRF Cookie für Login-Formular
        proxy_set_header Cookie dashboard_auth_csrf=$cookie_dashboard_auth_csrf;
    }

    # Auth Check Endpoint (intern genutzt von auth_request)
    location = /check-auth {
        internal;
        proxy_pass http://ldap_auth/check;
        
        # Keine Headers/Body an Auth-Service
        proxy_pass_request_headers off;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        
        # Für Caching - Set-Cookie ignorieren
        proxy_ignore_headers "Set-Cookie";
        proxy_hide_header "Set-Cookie";
        
        # Auth Response cachen (10 Minuten)
        proxy_cache auth_cache;
        proxy_cache_valid 200 10m;
        
        # Session Cookie übergeben
        proxy_set_header Cookie dashboard_auth=$cookie_dashboard_auth;
        proxy_cache_key "$http_authorization$cookie_dashboard_auth";
    }

    # ============================================================
    # Eigener Verify-Endpoint für das Frontend
    # Das Frontend sendet username/password, wir verifizieren gegen LDAP
    # ============================================================
    location = /api/auth/verify {
        # Zum Auth-Service weiterleiten
        proxy_pass http://ldap_auth/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        
        # CSRF Cookie
        proxy_set_header Cookie dashboard_auth_csrf=$cookie_dashboard_auth_csrf;
    }

    # Logout Endpoint
    location = /api/auth/logout {
        proxy_pass http://ldap_auth/auth/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie dashboard_auth=$cookie_dashboard_auth;
    }

    # ============================================================
    # Backend API - TEMPORÄR OHNE AUTH für Debugging
    # ============================================================
    location /api/ {
        # TODO: Auth später wieder aktivieren
        # auth_request /check-auth;
        # auth_request_set $auth_user $upstream_http_x_authenticated_user;
        # error_page 401 = @auth_required;
        
        # Request an Backend weiterleiten
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy Timeouts für Debugging
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Auth Required Response (JSON für Frontend)
    location @auth_required {
        default_type application/json;
        return 401 '{"error": "authentication_required", "message": "Bitte melden Sie sich an"}';
    }

    # ============================================================
    # Frontend (öffentlich zugänglich - Auth passiert im Modal)
    # ============================================================
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy Timeouts für Debugging
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket Support (falls benötigt)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================================
    # Health Check
    # ============================================================
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
