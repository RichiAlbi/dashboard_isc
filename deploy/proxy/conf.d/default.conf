# Dashboard ISC - Nginx Reverse Proxy
# Einfacher Proxy für Frontend und Backend
# Authentifizierung erfolgt direkt im Backend via /api/v1/auth/verify

# Upstream Definitionen
upstream frontend {
    server dashboard_frontend:80;
}

upstream backend {
    server dashboard_backend:8000;
}

upstream registry {
    server docker-registry:5000;
}

upstream registry-ui {
    server registry-ui:80;
}

server {
    listen 80;
    server_name _;

    # Access Log
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # Backend API
    # ============================================================
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================================
    # Frontend
    # ============================================================
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket Support (falls benötigt)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================================
    # Health Check
    # ============================================================
    location = /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ============================================================
    # Registry UI
    # ============================================================
    location /registry-ui/ {
        proxy_pass http://registry-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # Registry API (für die UI)
    # ============================================================
    location /v2/ {
        proxy_pass http://registry/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS Headers für Registry UI
        add_header Access-Control-Allow-Origin "http://disc.industrieschule.de" always;
        add_header Access-Control-Allow-Methods "HEAD, GET, OPTIONS, DELETE" always;
        add_header Access-Control-Allow-Headers "Authorization, Accept, Cache-Control" always;
        add_header Access-Control-Expose-Headers "Docker-Content-Digest" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "http://disc.industrieschule.de";
            add_header Access-Control-Allow-Methods "HEAD, GET, OPTIONS, DELETE";
            add_header Access-Control-Allow-Headers "Authorization, Accept, Cache-Control";
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain charset=UTF-8";
            add_header Content-Length 0;
            return 204;
        }
    }
}
