name: Build Docker Images

on:
  push:
    tags:
      - 'v*'  # Trigger bei Tags wie v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image Tag (z.B. v1.0.0)'
        required: false
        default: 'manual'

env:
  BACKEND_IMAGE: dashboard-backend
  FRONTEND_IMAGE: dashboard-frontend
  IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag || 'manual' }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Backend Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 30

      - name: Upload Frontend Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 30
